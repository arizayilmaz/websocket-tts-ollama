services:
  ws-gateway:
    build:
      context: ./services/ws-gateway
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      piper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3); import sys; sys.exit(0 if r.status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama:/root/.ollama
    entrypoint:
      ["sh", "-lc", "until ollama list >/dev/null 2>&1; do sleep 1; done; ollama pull \"$OLLAMA_MODEL\""]
    restart: "no"

  piper:
    build:
      context: ./services/piper-service
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - piper_cache:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 5000), 2); s.close(); print('ok')"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

volumes:
  ollama:
  piper_cache:
